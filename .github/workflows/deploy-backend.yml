name: Deploy backend to Fly.io

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      FLY_APP_NAME: code-puppy-api

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies for linting
        run: |
          pip install -r backend/requirements.txt
          pip install -e .

      - name: Run unit tests (worker smoke)
        run: |
          python -m compileall src/code_puppy_gui

      - name: Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Ensure Fly app exists
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          if flyctl apps show "$FLY_APP_NAME" >/dev/null 2>&1; then
            echo "Fly app $FLY_APP_NAME already exists."
          else
            echo "Creating Fly app $FLY_APP_NAME..."
            flyctl apps create "$FLY_APP_NAME"
          fi

      - name: Configure secrets
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          SYN_API_KEY: ${{ secrets.SYN_API_KEY }}
          OPEN_API_KEY: ${{ secrets.OPEN_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_STORAGE_BUCKET: ${{ secrets.SUPABASE_STORAGE_BUCKET }}
        run: |
          SECRET_ARGS=""

          if [ -n "$SYN_API_KEY" ]; then
            SECRET_ARGS="$SECRET_ARGS SYN_API_KEY=$SYN_API_KEY"
          fi
          if [ -n "$OPEN_API_KEY" ]; then
            SECRET_ARGS="$SECRET_ARGS OPEN_API_KEY=$OPEN_API_KEY"
          fi
          if [ -n "$SUPABASE_URL" ]; then
            SECRET_ARGS="$SECRET_ARGS SUPABASE_URL=$SUPABASE_URL"
          fi
          if [ -n "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            SECRET_ARGS="$SECRET_ARGS SUPABASE_SERVICE_ROLE_KEY=$SUPABASE_SERVICE_ROLE_KEY"
          fi
          if [ -n "$SUPABASE_STORAGE_BUCKET" ]; then
            SECRET_ARGS="$SECRET_ARGS SUPABASE_STORAGE_BUCKET=$SUPABASE_STORAGE_BUCKET"
          fi

          if [ -z "$SECRET_ARGS" ]; then
            echo "No deploy secrets provided. Skipping flyctl secrets set."
            exit 0
          fi

          if flyctl secrets set $SECRET_ARGS --app "$FLY_APP_NAME" --detach; then
            echo "Secrets synced to $FLY_APP_NAME."
          else
            echo "flyctl couldn't find $FLY_APP_NAME yet. Attempting to create it now..."
            if flyctl apps create "$FLY_APP_NAME"; then
              flyctl secrets set $SECRET_ARGS --app "$FLY_APP_NAME" --detach
            else
              echo "::error::Unable to create Fly app $FLY_APP_NAME. Update fly.toml (app value) to a unique name or create the app manually, then rerun."
              exit 1
            fi
          fi

      - name: Deploy via Fly.io
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          flyctl deploy --config fly.toml --remote-only
