name: Deploy web frontend

on:
  push:
    branches: [main]
    paths:
      - 'mobile/**'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy-web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Export Expo web app
        env:
          EXPO_PUBLIC_API_BASE: https://code-puppy-api.fly.dev
          EXPO_PUBLIC_WEB_BASE_PATH: /code-puppy-gui-git
          EXPO_PUBLIC_SUPABASE_URL: https://apalydgxzngsmzxgldlz.supabase.co
          EXPO_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
        run: npm run export:web

      - name: Prepare docs output
        run: |
          rm -rf ../docs/*
          cp -R dist/* ../docs/
          cp dist/index.html ../docs/404.html

      - name: Commit web export
        working-directory: .
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs
          if git diff --cached --quiet; then
            echo "No web changes to commit."
            exit 0
          fi
          git commit -m "Deploy Expo web frontend"
          git push
