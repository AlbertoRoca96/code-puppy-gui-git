name: Deploy backend to Fly.io

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'src/**'
      - 'tests/**'
      - 'pyproject.toml'
      - '.github/workflows/deploy-backend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - 'src/**'
      - 'tests/**'
      - 'pyproject.toml'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt
          python -m pip install -e .

      - name: Compile backend and desktop glue
        run: |
          python -m compileall backend src/code_puppy_gui tests

      - name: Run backend tests
        run: |
          python -m pytest -q

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      FLY_APP_NAME: code-puppy-api
    steps:
      - uses: actions/checkout@v4

      - name: Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Ensure Fly app exists
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          if flyctl apps show "$FLY_APP_NAME" >/dev/null 2>&1; then
            echo "Fly app $FLY_APP_NAME already exists."
          else
            flyctl apps create "$FLY_APP_NAME"
          fi

      - name: Configure secrets
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          SYN_API_KEY: ${{ secrets.SYN_API_KEY }}
          OPEN_API_KEY: ${{ secrets.OPEN_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_STORAGE_BUCKET: ${{ secrets.SUPABASE_STORAGE_BUCKET }}
        run: |
          SECRET_ARGS=""
          [ -n "$SYN_API_KEY" ] && SECRET_ARGS="$SECRET_ARGS SYN_API_KEY=$SYN_API_KEY"
          [ -n "$OPEN_API_KEY" ] && SECRET_ARGS="$SECRET_ARGS OPEN_API_KEY=$OPEN_API_KEY"
          [ -n "$SUPABASE_URL" ] && SECRET_ARGS="$SECRET_ARGS SUPABASE_URL=$SUPABASE_URL"
          [ -n "$SUPABASE_SERVICE_ROLE_KEY" ] && SECRET_ARGS="$SECRET_ARGS SUPABASE_SERVICE_ROLE_KEY=$SUPABASE_SERVICE_ROLE_KEY"
          [ -n "$SUPABASE_STORAGE_BUCKET" ] && SECRET_ARGS="$SECRET_ARGS SUPABASE_STORAGE_BUCKET=$SUPABASE_STORAGE_BUCKET"
          if [ -n "$SECRET_ARGS" ]; then
            flyctl secrets set $SECRET_ARGS --app "$FLY_APP_NAME" --detach
          fi

      - name: Deploy via Fly.io
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl deploy --config fly.toml --remote-only
